name: Sync Last.fm Scrobbles

on:
  schedule:
    # Запуск для теста в 11:39
    - cron: '39 11 * * *'
  # Возможность запустить вручную
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4.2.2
    
    - name: Set up Python
      uses: actions/setup-python@v5.4.0
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install python-telegram-bot==20.7 python-dotenv==1.0.0
    
    - name: Run sync script
      env:
        SUPABASE_HOST: ${{ secrets.SUPABASE_HOST }}
        SUPABASE_PORT: ${{ secrets.SUPABASE_PORT }}
        SUPABASE_DATABASE: ${{ secrets.SUPABASE_DATABASE }}
        SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
        SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
        LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
        LASTFM_USER: ${{ secrets.LASTFM_USER }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        ALLOWED_USERS: ${{ secrets.ALLOWED_USERS }}
      run: python sync_scrobbles_github.py